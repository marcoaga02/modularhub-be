spring:
  application:
    name: com.marcoaga02.modularhub
  profiles:
    active: keycloak
  docker:
    compose:
      file: com.marcoaga02.modularhub/compose.yaml
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    hibernate:
      ddl-auto: update
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8090/realms/modularhub

server:
  servlet:
    context-path: /api

keycloak:
  server-url: http://localhost:8090
  realm: modularhub
  admin:
    client-id: modularhub-backend
    client-secret: ${MODULARHUB_BACKEND_CLIENT_SECRET}

cors:
  allowed-origins:
    - http://localhost:4200
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed-headers:
    - "*"
  allow-credentials: true