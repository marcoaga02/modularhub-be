# This workflow will build a Java project with Maven
name: Java CI with Maven in Linux

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      workdir: com.marcoaga02.modularhub
      COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    strategy:
      matrix:
        java: [ 17, 21 ]

    name: Build with Java ${{ matrix.java }} on Linux
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2
            ~/.sonar/cache
          key: ${{ runner.os }}-m2-${{ matrix.java }}-${{ hashFiles('**/pom.xml', '**/*.yml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Set Maven Additional Goals
        run: |
          EXTRA=""
          if [ "${{ matrix.java }}" == "21" ]; then
            if [ -n "$COVERALLS_REPO_TOKEN" ]; then
              EXTRA="$EXTRA -Pcoveralls"
            fi
            if [ -n "$SONAR_TOKEN" ]; then
              EXTRA="$EXTRA sonar:sonar -Dsonar.organization=marcoaga02 -Dsonar.projectKey=marcoaga02_modularhub-be -Dsonar.host.url=https://sonarcloud.io"
            fi
          fi
          echo "EXTRA_GOALS=$EXTRA" >> $GITHUB_ENV

      - name: Build with Maven
        run: mvn verify $EXTRA_GOALS
        working-directory: ${{ env.workdir }}
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Generate JUnit Report
        run: mvn surefire-report:report-only
        working-directory: ${{ env.workdir }}
        if: ${{ always() }}

      - name: Archive JUnit Report
        uses: actions/upload-artifact@v6
        if: ${{ always() }}
        with:
          name: surefire-report-jdk-${{ matrix.java }}
          path: '**/target/reports'